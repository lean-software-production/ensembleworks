name: unit-tests
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # fetch-depth: 0 (deliberately deeper than the other workflows'
      # default-shallow checkouts): the ux-contract presence gate
      # (scripts/ux-contract-presence.test.ts, run as part of `bun run test`
      # below) diffs the PR against its base's merge-base — a triple-dot
      # `git diff base...HEAD` needs the merge-base commit present locally,
      # which a depth-1 checkout cannot guarantee.
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.12.0 }
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # The unit-test step doubles as the ux-contract presence gate (Task G2,
      # docs/plans/2026-07-16-ux-contracts-implementation.md): on PR events it
      # feeds the script the PR's real changed-file list and body via env.
      #
      # INJECTION SAFETY: the PR body is attacker-controlled free text, so it
      # is passed ONLY through the env: block below (GitHub sets the process
      # env directly — no shell interpolation, no `${{ }}` inside run:). The
      # changed-file list is computed in-shell into a plain variable — never
      # written through $GITHUB_ENV, whose heredoc delimiter a crafted
      # filename could otherwise collide with.
      #
      # On push/dispatch runs there is no PR: UX_CONTRACT_CHANGED_FILES stays
      # unset, so the script falls back to `git diff origin/main...HEAD`
      # (empty on a push to main itself — trivially green) or skips with a
      # clear message if no usable base exists; it never false-fails.
      # UX_CONTRACT_PR_BODY evaluates to '' then, which the script treats
      # identically to unset (an empty body carries no opt-out marker).
      - name: unit tests (feeds the ux-contract presence gate the PR diff + body)
        env:
          UX_CONTRACT_PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags origin "${GITHUB_BASE_REF}"
            UX_CONTRACT_CHANGED_FILES="$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD")"
            export UX_CONTRACT_CHANGED_FILES
          fi
          bun run test
