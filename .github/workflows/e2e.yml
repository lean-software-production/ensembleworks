name: e2e
on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *' # nightly perf capture

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    # PRs + manual only — nightly runs are perf capture; e2e already runs on every PR.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.12.0 }
      - run: bun install --frozen-lockfile
      - run: cd e2e && bunx playwright install --with-deps chromium
      - run: cd e2e && bunx playwright test --project=e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failures
          path: |
            e2e/test-results/
            e2e/playwright-report/
      # Task F2: `--project=e2e` above already walks the whole `tests/` dir,
      # which includes tests/parity.spec.ts — no separate invocation needed
      # here. This just publishes the score JSON that spec writes (lib/
      # parity.ts's writeParityArtifact) as the CI-visible "dashboard number"
      # for the cross-renderer gate. Runs on every PR, a superset of
      # "renderer-touching PRs" (parity.spec.ts's whole subject is canvas-
      # react/canvas-editor output, so any PR that could regress it is
      # already covered by this unfiltered trigger). always(), not
      # failure()-only: the score is exactly as interesting — often more —
      # when the overall gate trips.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-score-${{ github.run_id }}
          path: e2e/.artifacts/parity/parity-score.json
          retention-days: 14

  perf-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.12.0 }
      - run: bun install --frozen-lockfile
      - run: cd e2e && bunx playwright install --with-deps chromium
      - run: cd e2e && EW_CAPTURE=1 bunx playwright test --project=perf
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: perf-failures
          path: |
            e2e/test-results/
            e2e/playwright-report/
      - uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-${{ github.run_id }}
          path: e2e/baselines/
          retention-days: 14
      # Task F2 (nightly leg): the `e2e` job above intentionally skips
      # `schedule` events (its own condition, above), so the PR-side parity
      # coverage never fires nightly on its own — this is the only
      # schedule-triggered job in this workflow, so it's the nightly home.
      # One explicit file, not the whole `e2e` project (that project's other
      # specs aren't this job's concern and already run on every PR).
      - run: cd e2e && bunx playwright test --project=e2e tests/parity.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-score-nightly-${{ github.run_id }}
          path: e2e/.artifacts/parity/parity-score.json
          retention-days: 14
