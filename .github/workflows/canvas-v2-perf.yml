name: canvas-v2-perf
on:
  pull_request:
    # Renderer-PR gating (Task H3): only PRs that actually touch the new
    # engine's perf-sensitive surface pay for this job. e2e.yml's `e2e` job
    # runs on EVERY PR but only `--project=e2e` (functional specs) — it never
    # runs `--project=perf`, so this workflow is the ONLY place
    # canvas-v2-perf.spec.ts's 1k-shape 60fps gate runs on a PR at all.
    paths:
      - 'canvas-react/**'
      - 'canvas-editor/**'
      - 'client/src/canvas-v2/**'
      - 'e2e/perf/canvas-v2-perf.spec.ts'
      - 'e2e/lib/canvas-v2.ts'
      - 'e2e/lib/perf.ts'
      - '.github/workflows/canvas-v2-perf.yml'
  schedule:
    - cron: '41 5 * * *' # nightly browser-perf capture (documents the 5k/10k degradation curve; not gated)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canvas-v2-perf:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.12.0 }
      - run: bun install --frozen-lockfile
      - run: cd e2e && bunx playwright install --with-deps chromium
      # EW_CAPTURE=1 always on here (unlike the PR-gated tldraw job in
      # e2e.yml, which only captures on the nightly schedule): every run of
      # this spec — PR or nightly — is worth recording, since a renderer PR
      # is exactly when a perf regression would first show up, and the
      # uploaded artifact (not a repo commit — see below) is what a reviewer
      # would actually go look at.
      - run: cd e2e && EW_CAPTURE=1 bunx playwright test --project=perf canvas-v2-perf.spec.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: canvas-v2-perf-failures-${{ github.run_id }}
          path: |
            e2e/test-results/
            e2e/playwright-report/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: canvas-v2-perf-baseline-${{ github.run_id }}
          path: e2e/baselines/canvas-v2-perf.json
          retention-days: 14

  # Task G4 (phase-4 plan §1.6): entry-chunk bundle-size gate. Independent of
  # the browser-perf job above — no playwright/chromium needed, just a real
  # `vite build` — so it's its own job rather than extra steps tacked onto
  # canvas-v2-perf (which would make an unrelated failure there hide this
  # one, and vice versa). Shares this workflow's trigger set: the same
  # renderer-PR path filters already cover exactly the surface (canvas-react,
  # canvas-editor, client/src/canvas-v2) that could bloat the eager entry.
  bundle-size:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.12.0 }
      - run: bun install --frozen-lockfile
      - run: bun run --filter '@ensembleworks/client' build
      - run: bun client/scripts/bundle-size-check.ts
