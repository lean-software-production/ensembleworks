# EnsembleWorks tmux configuration.
#
# Derived from Omarchy's tmux.conf (https://github.com/basecamp/omarchy,
# MIT License, © Basecamp) with four local edits, marked ENSEMBLEWORKS below:
#   1. `?` shows tmux's own key list (Omarchy's menu script isn't installed).
#   2. `q` reloads from $ENSEMBLEWORKS_TMUX_CONF (set by the terminal gateway).
#   3. detach-on-destroy stays on: each canvas terminal is pinned to exactly
#      one session; the client must never hop to another crew's session.
#   4. Chips render bright-on-blue, not black-on-blue: Omarchy assumes a
#      bright ANSI blue, but ours is seal-blue navy (#004990).
#
# The theme block uses only named ANSI colors (blue, brightblack, default),
# so it inherits whatever palette the attached terminal defines — in the
# canvas that's the Wellmaintained paper palette from client/src/theme.ts.

# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Config and help
# ENSEMBLEWORKS: reload from the gateway-provided path; list keys with tmux itself.
bind q run-shell 'tmux source-file "$ENSEMBLEWORKS_TMUX_CONF"' \; display "Configuration reloaded"
bind ? display-popup -E -w 80% -h 70% -T "Tmux keybindings" "tmux list-keys -N | less -R"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# ENSEMBLEWORKS: mouse-copy ergonomics. The tmux default cancels the selection
# on drag-release (set-clipboard still copies via OSC 52, but the highlight
# vanishes so it looks like nothing happened) — keep it visible instead. Plus
# double-click = copy word, triple-click = copy line. All land in the browser
# clipboard through set-clipboard on → OSC 52 → xterm's ClipboardAddon.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send -X select-word \; send -X copy-selection-no-clear
bind -n TripleClick1Pane select-pane \; copy-mode -M \; send -X select-line \; send -X copy-selection-no-clear
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-selection-no-clear
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-selection-no-clear

# Pane Controls
# ENSEMBLEWORKS: no root-table M-Enter/M-S-Enter splits (Omarchy has them).
# Alt+Enter must reach the app inside — claude code treats ESC CR as
# "insert newline" — and the canvas client sends exactly that for
# Shift+Enter. Splits stay available on prefix h / v.
bind -n M-Escape kill-pane

bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
# ENSEMBLEWORKS: tmux < 3.4 swallows OSC 11 background queries, so apps inside
# (Claude Code, vim, bat) can't auto-detect the light background. COLORFGBG
# is the standard fallback those tools read: fg 0 (ink) on bg 15 (light).
set-environment -g COLORFGBG "0;15"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
# ENSEMBLEWORKS: keep tmux's default (on). Omarchy sets this off so a client hops
# to the next session when one dies, but a canvas terminal shape is pinned
# to exactly one session and must never start mirroring another crew's.
set -g detach-on-destroy on
set -g extended-keys on
# ENSEMBLEWORKS: -q — option only exists on tmux >= 3.5; ignore on older tmux.
set -gq extended-keys-format csi-u
set -sg escape-time 10

# Status bar
set -g status-position top
# ENSEMBLEWORKS: two status lines, the second blank — breathing room between the
# bar and the window content. (tmux has no real status padding; the space
# above the bar comes from the canvas shape's CSS.)
set -g status 2
set -g status-format[1] ""
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=brightwhite,bg=blue,bold] #S #[bg=default] "
# ENSEMBLEWORKS: the right side shows the canvas focus hint instead of the
# hostname (#h) — on the canvas, double-click focuses a terminal and Esc Esc
# returns to the board, so this reads as the in-terminal "how to get out" note.
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]Esc Esc to exit focus "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=brightwhite"
setw -g clock-mode-colour blue
