# EnsembleWorks tmux configuration.
#
# Derived from Omarchy's tmux.conf (https://github.com/basecamp/omarchy,
# MIT License, © Basecamp) with four local edits, marked ENSEMBLEWORKS below:
#   1. `?` shows tmux's own key list (Omarchy's menu script isn't installed).
#   2. `q` reloads from $ENSEMBLEWORKS_TMUX_CONF (set by the terminal gateway).
#   3. detach-on-destroy stays on: each canvas terminal is pinned to exactly
#      one session; the client must never hop to another crew's session.
#   4. Chips render bright-on-blue, not black-on-blue: Omarchy assumes a
#      bright ANSI blue, but ours is seal-blue navy (#004990).
#
# The theme block uses only named ANSI colors (blue, brightblack, default),
# so it inherits whatever palette the attached terminal defines — in the
# canvas that's the Wellmaintained paper palette from client/src/theme.ts.

# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Config and help
# ENSEMBLEWORKS: reload from the gateway-provided path; list keys with tmux itself.
bind q run-shell 'tmux source-file "$ENSEMBLEWORKS_TMUX_CONF"' \; display "Configuration reloaded"
bind ? display-popup -E -w 80% -h 70% -T "Tmux keybindings" "tmux list-keys -N | less -R"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# ENSEMBLEWORKS: Escape leaves copy-mode. Canvas users land in copy-mode by
# scroll-wheel (mouse on) and read the frozen output as a hang — the
# universal panic key must get them out. (Scrolling back to the bottom
# still auto-exits, and q still cancels; this adds the key people try.)
bind -T copy-mode-vi Escape send -X cancel
# ENSEMBLEWORKS: mouse-copy ergonomics. The tmux default cancels the selection
# on drag-release (set-clipboard still copies via OSC 52, but the highlight
# vanishes so it looks like nothing happened) — keep it visible instead. Plus
# double-click = copy word, triple-click = copy line. All land in the browser
# clipboard through set-clipboard on → OSC 52 → xterm's ClipboardAddon.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send -X select-word \; send -X copy-selection-no-clear
bind -n TripleClick1Pane select-pane \; copy-mode -M \; send -X select-line \; send -X copy-selection-no-clear
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-selection-no-clear
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-selection-no-clear

# Pane Controls
# ENSEMBLEWORKS: no root-table M-Enter/M-S-Enter splits (Omarchy has them).
# Alt+Enter must reach the app inside — claude code treats ESC CR as
# "insert newline" — and the canvas client sends exactly that for
# Shift+Enter. Splits stay available on prefix h / v.
# The unbinds are explicit (not just absent) so `source-file` heals a
# long-lived tmux server that loaded an older conf with these bindings —
# the server survives deploys by design, and sourcing can only add or
# remove what it names, never remove what it merely omits.
unbind -T root M-Enter
unbind -T root M-S-Enter
bind -n M-Escape kill-pane

bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
# ENSEMBLEWORKS: tmux < 3.4 swallows OSC 11 background queries, so apps inside
# (Claude Code, vim, bat) can't auto-detect the light background. COLORFGBG
# is the standard fallback those tools read: fg 0 (ink) on bg 15 (light).
set-environment -g COLORFGBG "0;15"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
# ENSEMBLEWORKS: keep tmux's default (on). Omarchy sets this off so a client hops
# to the next session when one dies, but a canvas terminal shape is pinned
# to exactly one session and must never start mirroring another crew's.
set -g detach-on-destroy on
set -g extended-keys on
# ENSEMBLEWORKS: -q — option only exists on tmux >= 3.5; ignore on older tmux.
set -gq extended-keys-format csi-u
set -sg escape-time 10

# Status bar
set -g status-position top
# ENSEMBLEWORKS: two status lines, the second blank — breathing room between the
# bar and the window content. (tmux has no real status padding; the space
# above the bar comes from the canvas shape's CSS.)
set -g status 2
set -g status-format[1] ""
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=brightwhite,bg=blue,bold] #S #[bg=default] "
# ENSEMBLEWORKS: the right side shows the canvas focus hint instead of the
# hostname (#h) — on the canvas, double-click focuses a terminal and Esc Esc
# returns to the board, so this reads as the in-terminal "how to get out" note.
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]Esc Esc to exit focus "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=brightwhite"
setw -g clock-mode-colour blue

# --- "Invisible tmux" ------------------------------------------------------
# Everything above gives us session persistence, scrollback and clipboard.
# Everything below removes the affordances that TELL the user they are inside
# a multiplexer: status bar, prefix, splits, windows, session switching and
# tmux's own right-click menus.
#
# Every removal is an explicit `unbind`, never an omission — same reasoning as
# the M-Enter block above: the canvas tmux server is long-lived and survives
# deploys, so this file is re-read via `source-file` onto servers that already
# hold the old bindings, and sourcing can only remove what it NAMES.
#
# To revert: `tmux source-file /etc/ensembleworks/tmux.conf` with this block
# deleted restores the status bar, prefix and every prefix-table binding. It
# does NOT restore the mouse-chrome unbinds at the bottom — those are tmux
# BUILT-IN defaults that no config file names, so only a fresh tmux server (or
# a hand-written re-bind) brings them back.

# Status bar. NOTE: this also removes the "Esc Esc to exit focus" hint, which
# is a canvas interaction rendered inside the terminal grid. Until the canvas
# client shows it as a transient on-focus overlay, a focused user has no
# in-band cue for how to get back to the board.
set -g status off

# Prefix. With splits/windows/sessions unbound below, a live prefix only buys
# stray swallowed keystrokes plus tmux's built-in defaults (prefix-d detach,
# prefix-: command prompt, prefix-% / prefix-" splits). Disabling it makes all
# of them unreachable at once, and lets C-Space / C-b through to the app.
set -g prefix None
set -g prefix2 None

# Pane management
unbind h
unbind v
unbind x
unbind -T root M-Escape
unbind -T root C-M-Left
unbind -T root C-M-Right
unbind -T root C-M-Up
unbind -T root C-M-Down
unbind -T root C-M-S-Left
unbind -T root C-M-S-Right
unbind -T root C-M-S-Up
unbind -T root C-M-S-Down

# Window management
unbind c
unbind k
unbind r
unbind -T root M-1
unbind -T root M-2
unbind -T root M-3
unbind -T root M-4
unbind -T root M-5
unbind -T root M-6
unbind -T root M-7
unbind -T root M-8
unbind -T root M-9
unbind -T root M-Left
unbind -T root M-Right
unbind -T root M-S-Left
unbind -T root M-S-Right

# Session management. A canvas terminal is pinned to exactly one session;
# switching clients would start mirroring another crew's work — same rationale
# as detach-on-destroy staying on above.
unbind C
unbind K
unbind R
unbind P
unbind N
unbind -T root M-Up
unbind -T root M-Down

# tmux's own chrome
unbind q          # source-file reload — the gateway sources by path, not key
unbind ?          # the keybinding popup

# Mouse chrome — the loudest remaining tell, and the one `prefix None` does
# NOT cover: right-click pops tmux's own context menu (Horizontal Split /
# Vertical Split / Swap / Kill / Respawn / Zoom). Mouse bindings live in the
# root table and are reachable with no prefix at all. Unbinding lets
# right-click fall through to the browser's context menu, which is what a user
# expects from a terminal in a web page.
unbind -T root MouseDown3Pane
unbind -T root M-MouseDown3Pane
unbind -T root MouseDrag1Border    # resize-pane -M

# Status-line mouse bindings. Already unreachable with `status off`, but
# unbound explicitly so re-enabling the bar later cannot silently restore a
# menu offering "New Session" and "Kill Window".
unbind -T root MouseDown1Status
unbind -T root MouseDown3Status
unbind -T root M-MouseDown3Status
unbind -T root MouseDown3StatusLeft
unbind -T root M-MouseDown3StatusLeft
unbind -T root WheelUpStatus
unbind -T root WheelDownStatus

# Deliberately KEPT — these read as ordinary terminal behaviour, not as tmux:
# mouse on, mode-keys vi + Escape-cancels, mouse drag/double/triple copy,
# set-clipboard on (OSC 52 -> browser clipboard), allow-passthrough on,
# history-limit 50000, aggressive-resize on, focus-events, extended-keys,
# detach-on-destroy on, base-index, COLORFGBG, default-terminal.
